category_name: research
display_name: AI/ML Research Papers

sources:
  - name: arXiv
    type: arxiv
    url: "http://export.arxiv.org/api/query?search_query=cat:cs.AI+OR+cat:cs.CL+OR+cat:cs.LG&start=0&max_results=30"
  
  - name: Semantic Scholar
    type: semantic_scholar
    url: "https://api.semanticscholar.org/graph/v1/paper/search?query=machine learning"
  
  - name: PubMed
    type: pubmed
    url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=artificial intelligence"
  
  - name: bioRxiv
    type: biorxiv
    url: "https://api.biorxiv.org/details/biorxiv/2024-01-01/2024-12-31/0/100"
  
  - name: OpenAlex
    type: openalex
    url: "https://api.openalex.org/works?search=machine learning"
  
  - name: CrossRef
    type: crossref
    url: "https://api.crossref.org/works?query=machine learning"

  # --- JavaScript-rendered sources (Playwright) ---
  - name: "RISS 학술검색"
    type: "javascript"
    url: "https://www.riss.kr/search/Search.do?isDetailSearch=Y&searchGubun=true&queryText=znSubject"
  - name: "KCI 학술지"
    type: "javascript"
    url: "https://www.kci.go.kr/kciportal/main.kci"

