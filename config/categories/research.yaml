category_name: research
display_name: AI/ML Research Papers
data_quality:
  priority: P2
  primary_motion: intelligence
  weakest_dimension: verification
  quality_outputs:
    freshness_report: reports/research_quality.json
    dated_freshness_report_pattern: reports/research_YYYYMMDD_quality.json
    tracked_event_models:
    - paper_release
    - citation_snapshot
    - code_repository
    - benchmark_result
  event_models:
    paper_release:
      date_fields:
      - published_date
      - collected_at
      required_fields:
      - paper_id
      - title
      - source_url
    citation_snapshot:
      date_fields:
      - metric_date
      - collected_at
      required_fields:
      - paper_id
      - citation_count
      - source
    code_repository:
      date_fields:
      - repository_created_at
      - last_updated_at
      - collected_at
      required_fields:
      - paper_id
      - repository
      - source_url
    benchmark_result:
      date_fields:
      - result_date
      - collected_at
      required_fields:
      - paper_id
      - benchmark_name
      - metric_name
      - metric_value
  canonical_keys:
    paper:
    - arxiv_id
    - doi
    - normalized_title
    repository:
    - host
    - owner
    - repo
  freshness_sla:
    paper_release_days: 3
    citation_snapshot_days: 14
    code_repository_days: 14
    benchmark_result_days: 30
  quality_gates:
  - paper title, arXiv id, DOI를 canonical key로 정리한다
  - 논문 발표일과 코드 공개일을 별도 이벤트로 유지한다
  - citation count는 수집 source와 기준일을 함께 기록한다
  - 재현성 점수는 code availability와 benchmark 근거를 분리한다
source_backlog:
  operational_candidates:
  - id: openalex_citation_api
    name: OpenAlex citation API
    signal_type: citation_snapshot
    activation_gate: DOI/arXiv mapping, metric date retention, and citation source
      caveats
  - id: semantic_scholar_citation_api
    name: Semantic Scholar citation API
    signal_type: citation_snapshot
    activation_gate: API key/quota, paper id mapping, and missing DOI policy
  - id: paperswithcode_benchmark_data
    name: Papers with Code benchmark data
    signal_type: benchmark_result
    activation_gate: benchmark taxonomy, metric direction, and paper repository mapping
  - id: github_repository_metrics
    name: GitHub repository metrics
    signal_type: code_repository
    activation_gate: repository evidence extraction, star/fork timestamp policy, and
      paper mapping
