name: Paper Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-crawler
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "radar-core @ git+https://github.com/ai-frendly-datahub/radar-core.git@main"
          pip install -r requirements.txt
      
      - name: Run paper collection
        run: |
          python main.py --category research --recent-days 7 --keep-days 90

      - name: Generate index.html
        run: |
          python -c "from paperradar.reporter import generate_index_html; from pathlib import Path; generate_index_html(Path('reports'))"

      - name: Run Quality Checks
        if: always()
        run: |
          python scripts/check_quality.py > quality_report.txt 2>&1 || true
          cat quality_report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: quality_report.txt
          retention-days: 30
      
      - name: Commit DuckDB changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update paper database'
          file_pattern: 'data/*.duckdb'
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
      
      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-database
          path: data/papers.duckdb
          retention-days: 30
      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.NOTIFICATION_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ github.repository }}",
              "workflow": "${{ github.workflow }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "status": "failure",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }' || true
