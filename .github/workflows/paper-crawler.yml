name: Paper Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-crawler
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run paper collection
        run: |
          python main.py --category research --recent-days 7 --keep-days 90
      
      - name: Commit DuckDB changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update paper database'
          file_pattern: 'data/*.duckdb'
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
      
      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-database
          path: data/papers.duckdb
          retention-days: 30
